<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор промптов: Драматические истории о справедливости</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .btn-claude {
            background: linear-gradient(135deg, #cc785c 0%, #b5653a 100%);
            color: #fff;
        }
        .btn-claude:hover {
            background: linear-gradient(135deg, #b5653a 0%, #9e5230 100%);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎭 Генератор промптов</h1>
            <p class="subtitle">Драматические истории о предательстве, справедливости и силе духа</p>
        </header>

        <main>
            <div class="generator-card">
                <h2>Параметры истории</h2>

                <!-- Тип героини -->
                <div class="form-group">
                    <label for="heroine">👩 Тип героини</label>
                    <select id="heroine">
                        <option value="">Выберите...</option>
                        <option value="Вдова 45-50 лет, одна растила двоих детей, работает бухгалтером">Вдова 45-50, бухгалтер, двое детей</option>
                        <option value="Финансовый аналитик 35-45 лет, замужем, без детей">Финансовый аналитик 35-45</option>
                        <option value="Жена успешного бизнесмена, сама работает в крупной компании">Жена бизнесмена + своя карьера</option>
                        <option value="Мать взрослого сына 50-55 лет, вдова, гордится сыном">Мать взрослого сына (свекровь)</option>
                        <option value="Работающая мать с двумя детьми, муж в командировках">Работающая мать с двумя детьми</option>
                        <option value="Главный бухгалтер в небольшой фирме, замужем 25 лет">Главбух с большим стажем брака</option>
                        <option value="Редактор в издательстве, маленькая дочь, муж безработный">Редактор/копирайтер</option>
                        <option value="Логист/менеджер проектов в крупной компании">Логист/менеджер проектов</option>
                        <option value="Учительница средней школы, замужем, дети-подростки">Учительница</option>
                        <option value="Медсестра в частной клинике, разведена, есть ребёнок">Медсестра/врач</option>
                        <option value="Успешная предпринимательница, владелица собственного бизнеса">Успешная предпринимательница</option>
                        <option value="Дизайнер интерьеров/архитектор, фрилансер">Дизайнер/архитектор</option>
                        <option value="Юрист в крупной компании, замужем, дети">Юрист/нотариус</option>
                        <option value="Программист/IT-специалист, удалённая работа">Программист/IT-специалист</option>
                        <option value="Фрилансер на удалёнке, мама дошкольника">Фрилансер с маленьким ребёнком</option>
                        <option value="Владелица небольшой пекарни/кофейни, поднявшая бизнес с нуля">Владелица пекарни/кофейни</option>
                        <option value="Кадровик в крупной компании, замужем 20 лет, взрослая дочь">Кадровик с 20-летним стажем брака</option>
                        <option value="Ветеринар в частной клинике, разведена, живёт с кошками">Ветеринар, одинокая</option>
                        <option value="Психолог в частной практике, замужем за коллегой">Психолог в частной практике</option>
                        <option value="Старший библиотекарь, 50 лет, живёт с престарелой матерью">Библиотекарь со старой матерью</option>
                        <option value="Рестораторша, открыла семейное кафе вместе с мужем">Рестораторша (семейный бизнес с мужем)</option>
                        <option value="Журналистка-расследовательница регионального издания">Журналистка-расследовательница</option>
                        <option value="Хозяйка цветочного магазина, развелась 5 лет назад">Хозяйка цветочного магазина</option>
                    </select>
                </div>

                <!-- Тип антагониста -->
                <div class="form-group">
                    <label for="antagonist">😈 Тип антагониста</label>
                    <select id="antagonist">
                        <option value="">Выберите...</option>
                        <option value="Муж и его молодая любовница-секретарша, на которую он тайно тратит семейные деньги">Муж + любовница-секретарша</option>
                        <option value="Муж и родная младшая сестра героини, которая выманила деньги под предлогом болезни">Муж + родная сестра (любовники)</option>
                        <option value="Троюродная сестра 'из деревни', попросившая временного приюта">Троюродная родственница из деревни</option>
                        <option value="Невестка-мошенница, симулирующая смертельную болезнь">Невестка-мошенница (фальшивая болезнь)</option>
                        <option value="Золовка-нахлебница с детьми, привыкшая жить за чужой счёт">Золовка-нахлебница с детьми</option>
                        <option value="Свекровь-снобка из 'высшего общества', презирающая невестку">Свекровь-снобка (высшее общество)</option>
                        <option value="Свекровь-тиран, вторгающаяся в жизнь молодой семьи без спроса">Свекровь-тиран (нарушает границы)</option>
                        <option value="Родная мать героини, инфантильная и эгоистичная">Родная мать (инфантильная)</option>
                        <option value="Лучшая подруга, оказавшаяся предательницей">Лучшая подруга-предательница</option>
                        <option value="Младшая сестра, избалованная 'принцесса семьи'">Младшая сестра (принцесса семьи)</option>
                        <option value="Двоюродный брат/сестра-мошенник, прикидывающийся жертвой обстоятельств">Двоюродный родственник-мошенник</option>
                        <option value="Бывший муж и его новая жена, претендующие на имущество">Бывший муж + новая жена</option>
                        <option value="Коллега по работе, плетущая интриги ради повышения">Коллега-интриганка</option>
                        <option value="Соседка-манипуляторша, вторгающаяся в жизнь семьи">Соседка-манипуляторша</option>
                        <option value="Дальняя 'бедная' родственница, оказавшаяся хищницей">Дальняя 'бедная' родственница</option>
                        <option value="Племянница-инфлюэнсер, использующая семью ради контента и денег">Племянница-инфлюэнсер</option>
                        <option value="Деловой партнёр-аферист, похитивший прибыль и репутацию">Деловой партнёр-аферист</option>
                        <option value="Сын от первого брака мужа, претендующий на квартиру героини">Пасынок-наследник</option>
                        <option value="Молодая мачеха отца, охотящаяся за наследством">Мачеха-охотница за наследством</option>
                        <option value="Тётка-манипуляторша, навязавшаяся 'помогать' с детьми">Тётка-надзирательница</option>
                        <option value="Подчинённая, плетущая интриги, чтобы занять кресло героини">Подчинённая-карьеристка</option>
                        <option value="Зять-альфонс, женившийся на дочери ради квартиры героини">Зять-альфонс</option>
                        <option value="Сватья, разрушающая брак сына/дочери ради своих интересов">Сватья-разрушительница</option>
                    </select>
                </div>

                <!-- Вид предательства -->
                <div class="form-group">
                    <label for="betrayal">💔 Вид предательства</label>
                    <select id="betrayal">
                        <option value="">Выберите...</option>
                        <option value="Финансовое предательство: антагонист годами тайно тратит семейные деньги, пока героиня экономит на себе">Финансовое (тайные траты годами)</option>
                        <option value="Захват жилья: антагонист меняет замки в квартире героини, пытаясь её выжить">Захват жилья (смена замков)</option>
                        <option value="Фальшивая смертельная болезнь: антагонист симулирует тяжёлый диагноз ради денег">Фальшивая смертельная болезнь</option>
                        <option value="Публичное унижение: антагонист унижает героиню или её родителей перед гостями">Публичное унижение перед гостями</option>
                        <option value="Манипуляция детьми: антагонист настраивает детей против матери">Манипуляция детьми против матери</option>
                        <option value="Тайная ипотека: муж 5 лет платит ипотеку любовнице, пока жена экономит">Тайная ипотека на любовницу</option>
                        <option value="Спуск всех денег: антагонист тратит всю зарплату героини на банкет/прихоти">Спуск всей зарплаты на банкет</option>
                        <option value="Продажа имущества без согласия: антагонист распоряжается чужой собственностью">Продажа имущества без согласия</option>
                        <option value="Оформление кредитов на чужое имя или с обманом">Кредиты с обманом</option>
                        <option value="Шантаж и угрозы для получения имущества или денег">Шантаж и угрозы</option>
                        <option value="Присвоение наследства родителей через манипуляции">Присвоение наследства</option>
                        <option value="Клевета и репутационный урон в семье или на работе">Клевета и репутационный урон</option>
                        <option value="Тайный второй ребёнок на стороне, о котором муж скрывал годами">Тайный ребёнок на стороне</option>
                        <option value="Подделка подписи героини на документах (доверенность, договор)">Подделка подписи на документах</option>
                        <option value="Кража бизнес-идеи и увод клиентов из компании героини">Кража бизнеса и клиентов</option>
                        <option value="Тайная продажа квартиры родителей героини с разделом денег">Тайная продажа родительской квартиры</option>
                        <option value="Подмена завещания пожилого родственника в свою пользу">Подмена завещания</option>
                        <option value="Намеренное доведение до увольнения через интриги на работе">Травля и увольнение через интриги</option>
                        <option value="Тайное оформление дарственной на квартиру героини в свою пользу">Тайная дарственная на квартиру</option>
                        <option value="Содержание любовницы в съёмной квартире за счёт семейного бюджета">Содержание любовницы за счёт семьи</option>
                        <option value="Психологический абьюз и газлайтинг: героиню годами убеждали, что она 'не в себе'">Газлайтинг и психологический абьюз</option>
                        <option value="Эмоциональное предательство: антагонист годами скрывал двойную жизнь">Двойная жизнь годами</option>
                    </select>
                </div>

                <!-- Способ открытия правды -->
                <div class="form-group">
                    <label for="revelation">🔍 Способ открытия правды</label>
                    <select id="revelation">
                        <option value="">Выберите...</option>
                        <option value="Случайный телефонный звонок из клиники, банка или другого учреждения, раскрывающий обман">Случайный звонок из учреждения</option>
                        <option value="Найденные банковские выписки или документы, выпавшие из папки/ящика стола">Найденные банковские выписки</option>
                        <option value="Фотографии из соцсетей: антагонист на курорте, пока героиня страдает">Фото из соцсетей (курорт)</option>
                        <option value="Переписка в мессенджере (WhatsApp/Telegram), забытая на чужом телефоне">Переписка в мессенджере</option>
                        <option value="Частный детектив, нанятый героиней для проверки подозрений">Частный детектив</option>
                        <option value="Свидетель (сосед, коллега, домработница) случайно раскрывает правду">Свидетель раскрывает правду</option>
                        <option value="Ребёнок случайно проговаривается о том, что слышал/видел">Ребёнок случайно проговорился</option>
                        <option value="Документы выпали из сумки/портфеля антагониста">Документы выпали случайно</option>
                        <option value="Звонок из банка о просроченных долгах или подозрительных операциях">Звонок из банка о долгах</option>
                        <option value="Видео или аудиозапись разговора, попавшая к героине">Видео/аудиозапись</option>
                        <option value="Курьер привозит посылку/документы по неожиданному адресу">Курьер с подозрительной посылкой</option>
                        <option value="Уведомление от Госуслуг или налоговой о неизвестной сделке">Уведомление от Госуслуг/налоговой</option>
                        <option value="Старая подруга случайно встречает антагониста в неожиданном месте">Случайная встреча подруги с антагонистом</option>
                        <option value="Бухгалтер или нотариус замечает несостыковки в документах">Бухгалтер замечает несостыковки</option>
                        <option value="Анонимное письмо или сообщение от 'доброжелателя'">Анонимное письмо</option>
                        <option value="Записка или вещь, забытая антагонистом в кармане одежды">Забытая записка в кармане</option>
                        <option value="Камера видеонаблюдения в подъезде/офисе фиксирует встречу">Запись с камеры наблюдения</option>
                        <option value="Свекровь/мать, мучимая совестью, сама раскрывает правду">Раскаявшийся свидетель из семьи</option>
                        <option value="Геолокация в семейном приложении показывает, что антагонист не там, где сказал">Геолокация выдаёт ложь</option>
                        <option value="Письмо от 'бывшей' антагониста с предупреждением о его методах">Письмо от прошлой жертвы</option>
                        <option value="Случайно отправленное сообщение в общий семейный чат">Сообщение по ошибке в общий чат</option>
                        <option value="Старая фотография в семейном архиве, выдающая давний обман">Старое фото из семейного архива</option>
                    </select>
                </div>

                <!-- Жертва героини -->
                <div class="form-group">
                    <label for="sacrifice">💸 Что героиня отдала/потеряла</label>
                    <select id="sacrifice">
                        <option value="">Выберите...</option>
                        <option value="Любимая дача с яблоневым садом, посаженным своими руками">Дача с яблоневым садом</option>
                        <option value="Машина-мечта, на которую копила 2 года ('Вишенка', красный кроссовер)">Машина-мечта (копила годами)</option>
                        <option value="Все сбережения семьи (2-3 миллиона рублей), копившиеся годами">Все сбережения (2-3 млн)</option>
                        <option value="Квартира или доля в жилье, доставшаяся от родителей">Квартира/доля в жилье</option>
                        <option value="25 лет жизни в режиме жёсткой экономии ради 'общего будущего'">25 лет жизни в экономии</option>
                        <option value="Карьера или образование, отложенные ради семьи">Карьера/образование</option>
                        <option value="Здоровье, нервы, годы бессонницы и стресса">Здоровье и нервы</option>
                        <option value="Отношения с детьми, испорченные манипулятором">Отношения с детьми</option>
                        <option value="Наследство от родителей, потраченное на нужды антагониста">Наследство от родителей</option>
                        <option value="Личное достоинство и самоуважение">Личное достоинство</option>
                        <option value="Бизнес, который героиня строила 10 лет с нуля">Собственный бизнес</option>
                        <option value="Свадебное золото и фамильные украшения от бабушки">Фамильные украшения</option>
                        <option value="Загородный дом, построенный на деньги от продажи квартиры родителей">Загородный дом</option>
                        <option value="Доверие старшего ребёнка, ушедшего жить к отцу">Доверие старшего ребёнка</option>
                        <option value="Дружба с лучшей подругой, которую антагонист увёл/настроил">Дружба с лучшей подругой</option>
                        <option value="Доброе имя в профессиональном сообществе">Профессиональная репутация</option>
                        <option value="Любимое хобби и круг общения, заброшенные ради семьи">Хобби и круг общения</option>
                        <option value="Молодость и красота — пока антагонист жил в своё удовольствие">Молодость и красота</option>
                        <option value="Возможность родить второго ребёнка — годы ушли на чужие проблемы">Упущенное материнство</option>
                        <option value="Пенсионные накопления, переведённые на счёт антагониста">Пенсионные накопления</option>
                        <option value="Отношения с пожилыми родителями, против которых героиню настроили">Отношения с родителями</option>
                        <option value="Большая семейная библиотека и коллекция, собранная отцом">Семейная библиотека/коллекция отца</option>
                    </select>
                </div>

                <!-- Финал -->
                <div class="form-group">
                    <label for="ending">🏆 Финал истории</label>
                    <select id="ending">
                        <option value="">Выберите...</option>
                        <option value="Развод через суд: героиня нанимает жёсткого адвоката, выигрывает дело и получает компенсацию (включая часть имущества антагониста)">Развод + суд + компенсация</option>
                        <option value="Изгнание антагониста с помощью полиции/МЧС: вызов наряда, составление протокола">Изгнание + полиция/МЧС</option>
                        <option value="Публичное разоблачение перед всеми гостями/родственниками с документами в руках">Публичное разоблачение</option>
                        <option value="Антагонист вынужден продать машину/квартиру/имущество, чтобы покрыть долги">Антагонист продаёт имущество</option>
                        <option value="Героиня молча уходит, хлопнув дверью, оставляя антагониста наедине с последствиями">Уход с гордо поднятой головой</option>
                        <option value="Новая успешная карьера: героиня открывает свой бизнес или получает повышение">Новая карьера + успех</option>
                        <option value="Новая любовь: героиня встречает достойного мужчину (сосед, коллега, новый знакомый)">Новая любовь + счастье</option>
                        <option value="Примирение через установление жёстких границ: антагонист капитулирует и меняет поведение">Примирение через границы</option>
                        <option value="Уголовное дело против антагониста: мошенничество, подделка документов, статья УК">Уголовное дело и срок</option>
                        <option value="Антагонист теряет работу/должность из-за раскрывшейся правды">Антагонист теряет работу</option>
                        <option value="Антагониста бросают его сообщники/любовник, оставляя ни с чем">Антагониста бросают сообщники</option>
                        <option value="Героиня переезжает в другой город и начинает жизнь с чистого листа">Переезд и жизнь с нуля</option>
                        <option value="Дети, узнав правду, встают на сторону героини и обрывают связь с антагонистом">Дети возвращаются к героине</option>
                        <option value="Героиня основывает фонд/проект помощи женщинам в похожей ситуации">Фонд помощи женщинам</option>
                        <option value="Антагонист публично извиняется, но героиня уже простилась с прошлым">Извинение, но без возврата</option>
                        <option value="Через год героиня встречает антагониста — и тот не узнаёт в успешной женщине прежнюю жертву">Встреча через год: не узнал</option>
                        <option value="Антагонист пытается вернуть героиню — она спокойно отказывает">Попытка вернуть и отказ</option>
                        <option value="Героиня выкупает у антагониста его долю имущества по решению суда">Выкуп доли по суду</option>
                        <option value="Антагонист остаётся один: все, кого использовал, отвернулись">Антагонист остаётся в одиночестве</option>
                        <option value="Героиня пишет книгу/блог о пережитом и становится известной">Книга/блог приносят известность</option>
                        <option value="Героиня усыновляет ребёнка и обретает то, чего была лишена">Усыновление и обретение семьи</option>
                        <option value="Антагонист сам приходит просить прощения — героиня молча закрывает дверь">Молча закрытая дверь</option>
                    </select>
                </div>

                <!-- Длина -->
                <div class="form-group">
                    <label for="length">📏 Длина истории</label>
                    <select id="length">
                        <option value="">Выберите...</option>
                        <option value="Короткая история, объём СТРОГО от 1800 до 2200 слов (НЕ МЕНЕЕ 1800 слов)">Короткая (1800-2200 слов)</option>
                        <option value="Средняя история, объём СТРОГО от 2200 до 2600 слов (НЕ МЕНЕЕ 2200 слов)">Средняя (2200-2600 слов)</option>
                        <option value="Длинная история, объём СТРОГО от 2600 до 3000 слов (НЕ МЕНЕЕ 2600 слов)">Длинная (2600-3000 слов)</option>
                    </select>
                </div>

                <!-- Кнопки -->
                <div class="buttons">
                    <button id="generateBtn" class="btn btn-primary">✨ Сгенерировать промпт</button>
                    <button id="randomBtn" class="btn btn-secondary">🎲 Случайный выбор</button>
                </div>
            </div>

            <!-- Результат -->
            <div class="result-card" id="resultCard" style="display: none;">
                <h2>📝 Готовый промпт</h2>
                <div class="prompt-output" id="promptOutput"></div>
                <div class="buttons">
                    <button id="copyBtn" class="btn btn-success">📋 Скопировать в буфер</button>
                    <button id="geminiBtn" class="btn btn-gemini">🚀 Открыть в Gemini</button>
                    <button id="claudeBtn" class="btn btn-claude">✦ Открыть в Claude</button>
                </div>
                <p class="copy-status" id="copyStatus"></p>
            </div>
        </main>

        <footer>
            <p>Генератор промптов для драматических историй о справедливости © 2026</p>
        </footer>
    </div>

</body>
